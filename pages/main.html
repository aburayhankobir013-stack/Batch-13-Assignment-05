<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>GITHUB-ISSUES-TRACKER</title>
</head>
<body class="font-sans">
  <!-- Main container -->
   <div class="container mx-auto border border-red-500 min-h-screen">
    <!-- Header -->
    <header class="border border-red-500 flex flex-col items-center gap-2 sm:flex-row sm:justify-between p-2">
      <!-- Logo -->
       <div class="flex flex-col gap-2 items-center sm:flex-row">
        <figure class="size-12 sm:size-6">
          <img src="../assets/github-logo.png" alt="Github logo" class="size-full">
        </figure>
        <h1 class="text-xl font-bold tracking-tighter">
            Github Issues Tracker
          </h1>
       </div>
       <form action="#" class="flex gap-2 items-center">
        <div>
          <input type="text" name="" id="search" placeholder="Search Issues..." class="border border-gray-400 p-1 font-semibold rounded-sm">
        </div>
        <div>
          <input type="submit" value="+New Issue" class="bg-violet-900 text-white font-semibold p-1 rounded-sm cursor-pointer hover:bg-violet-950">
        </div>
       </form>
    </header>
    <!-- Navigator container -->
     
   </div>
</body>
</html>
